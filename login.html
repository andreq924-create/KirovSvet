<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Базовые security-настройки для страницы -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- CSP для single-file страницы.
         В идеале CSP задавать заголовком на сервере, а не meta. -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            base-uri 'none';
            object-src 'none';
            frame-ancestors 'none';
            form-action 'self';
            img-src 'self' data:;
            style-src 'self' 'unsafe-inline';
            script-src 'self' 'unsafe-inline';
            connect-src 'self';
            upgrade-insecure-requests
          ">

    <meta name="color-scheme" content="dark light">
    <title>Вход</title>

    <style>
        :root {
            --bg-1: #1e2a38;
            --bg-2: #2f3f52;
            --card-border: rgba(255, 255, 255, 0.10);
            --text-muted: #d7deea;
            --accent: #FFD700;
            --accent-hover: #FFC300;
            --success: #28a745;
            --error: #dc3545;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 215, 0, 0.10), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.06), transparent 22%),
                        linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: #fff;
            min-height: 100vh;
        }

        header {
            background-color: rgba(30, 42, 56, 0.96);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.2px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        nav a:hover {
            color: #FFD700;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 140px);
            padding: 28px 16px;
        }

        .form-container {
            width: min(100%, 480px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-title {
            margin: 0;
            text-align: center;
            font-size: 28px;
            line-height: 1.1;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.18);
        }

        .form-subtitle {
            margin: 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        form {
            background: rgba(255, 255, 255, 0.98);
            color: #000;
            padding: 32px;
            border-radius: 18px;
            width: 100%;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid var(--card-border);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        form label {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
        }

        form input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            background: #fff;
            font-size: 15px;
        }

        form input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.14);
        }

        form input:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
            opacity: 0.9;
        }

        form button {
            margin-top: 10px;
            padding: 13px 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #FFD700, #FFC300);
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.18);
            transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
        }

        form button:hover {
            background: linear-gradient(135deg, #ffe24d, #ffc300);
            transform: translateY(-1px);
        }

        form button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
            transform: none;
            filter: grayscale(0.15);
        }

        footer {
            background: #000;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* МОДАЛКА */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        #modalBox {
            background: #fff;
            color: #000;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-top: 6px solid transparent;
        }

        #modalBox.success {
            border-top: 6px solid #28a745;
        }

        #modalBox.error {
            border-top: 6px solid #dc3545;
        }

        #modalText {
            word-break: break-word;
        }

        #modalBox button {
            margin-top: 15px;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        #modalBox button:hover {
            background: #FFC300;
        }

        @media (max-width: 560px) {
            header {
                padding: 14px 16px;
                flex-direction: column;
                align-items: flex-start;
            }

            nav ul {
                gap: 14px;
                flex-wrap: wrap;
            }

            form {
                padding: 22px;
            }

            .form-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
<header>
    <h1>Вход</h1>
    <nav>
        <ul>
            <li><a href="index.html" rel="noopener">Главная</a></li>
            <li><a href="register.html" rel="noopener">Регистрация</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-container">
        <h2 class="form-title">Добро пожаловать!</h2>
 
        <form id="loginForm" autocomplete="off" novalidate spellcheck="false">
            <div class="field">
                <label for="username">Имя пользователя:</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    minlength="3"
                    maxlength="64"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    inputmode="text"
                >
            </div>

            <div class="field">
                <label for="password">Пароль:</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="8"
                    maxlength="128"
                    autocomplete="off"
                >
            </div>

            <button type="submit" id="submitBtn">Войти</button>
        </form>
    </div>
</main>

<!-- МОДАЛЬНОЕ ОКНО -->
<div id="modal" aria-hidden="true">
    <div id="modalBox" role="dialog" aria-modal="true" aria-labelledby="modalText">
        <div id="modalText"></div>
        <button type="button" id="closeModalBtn">Ок</button>
    </div>
</div>

<script>
(function () {
    'use strict';

    // Лёгкая защита от запуска внутри iframe.
    // Это не замена серверной защите, но убирает часть простых атак.
    try {
        if (window.top !== window.self) {
            window.top.location = window.location.href;
        }
    } catch (_) {
        // Игнорируем, если доступ к top запрещён политиками браузера.
    }

    const loginForm = document.getElementById('loginForm');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const submitBtn = document.getElementById('submitBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    let isSubmitting = false;

    function setFormDisabled(disabled) {
        submitBtn.disabled = disabled;
        usernameInput.disabled = disabled;
        passwordInput.disabled = disabled;
    }

    function showModal(message, type = 'error') {
        const modal = document.getElementById('modal');
        const box = document.getElementById('modalBox');
        const text = document.getElementById('modalText');

        text.textContent = String(message);

        box.classList.remove('success', 'error');
        box.classList.add(type);

        modal.style.display = 'flex';
        modal.setAttribute('aria-hidden', 'false');
        closeModalBtn.focus();
    }

    function closeModal() {
        const modal = document.getElementById('modal');
        modal.style.display = 'none';
        modal.setAttribute('aria-hidden', 'true');
    }

    function isValidUsername(value) {
        // Разрешаем обычные символы имени пользователя; при желании можно ужесточить на сервере.
        return /^[\p{L}\p{N}._@-]{3,64}$/u.test(value);
    }

    function isValidPassword(value) {
        return typeof value === 'string' && value.length >= 8 && value.length <= 128;
    }

    loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (isSubmitting) return;

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
            showModal('Пожалуйста, заполните все поля!', 'error');
            return;
        }

        if (!isValidUsername(username)) {
            showModal('Имя пользователя содержит недопустимые символы.', 'error');
            return;
        }

  
        const currentTime = Date.now();
        const failedAttempts = parseInt(sessionStorage.getItem('failedAttempts') || '0', 10);
        const blockTime = parseInt(sessionStorage.getItem('blockTime') || '0', 10);

        if (blockTime > currentTime) {
            const remainingTime = Math.ceil((blockTime - currentTime) / 1000);
            showModal(`Вы заблокированы на ${remainingTime} секунд!`, 'error');
            return;
        }

        isSubmitting = true;
        setFormDisabled(true);
        submitBtn.textContent = 'Проверка...';

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'include',
                cache: 'no-store',
                redirect: 'error',
                signal: controller.signal,
                body: JSON.stringify({
                    username,
                    password
                })
            });

            clearTimeout(timeoutId);

            let data = null;
            const contentType = response.headers.get('content-type') || '';

            if (contentType.includes('application/json')) {
                data = await response.json();
            }

            if (response.ok && data && data.success) {
                sessionStorage.removeItem('failedAttempts');
                sessionStorage.removeItem('blockTime');

                // ВАЖНО:
                // Роль, полученная на клиенте, нельзя считать доверенной.
                // Для реальной защиты dashboard-страниц сервер должен проверять сессию/токен и роль.
                sessionStorage.setItem('username', data.username || username);

                window.location.href =
                    data.role === 'admin'
                        ? 'admin_dashboard.html'
                        : 'user_dashboard.html';
                return;
            }

            const nextFailedAttempts = failedAttempts + 1;
            sessionStorage.setItem('failedAttempts', String(nextFailedAttempts));

            if (nextFailedAttempts >= 5) {
                const blockUntil = currentTime + 10000;
                sessionStorage.setItem('blockTime', String(blockUntil));
                showModal('Превышено количество попыток! Блокировка на 10 секунд.', 'error');
            } else {
                showModal((data && data.message) || 'Неверный логин или пароль!', 'error');
            }
        } catch (error) {
            clearTimeout(timeoutId);
            console.error(error);
            showModal('Ошибка соединения с сервером', 'error');
        } finally {
            isSubmitting = false;
            setFormDisabled(false);
            submitBtn.textContent = 'Войти';
        }
    });

    closeModalBtn.addEventListener('click', closeModal);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
        }
    });
})();
</script>
</body>
</html>
